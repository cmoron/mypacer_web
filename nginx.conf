server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    location /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        # adapter-static génère <route>.html pour chaque page prerenderée
        # ($uri.html est nécessaire pour servir /mentions-legales -> mentions-legales.html)
        try_files $uri $uri.html $uri/ /index.html;
    }
}
